<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0EA5E9;--blue-bright:#38BDF8;--blue-dim:#0284C7;
  --blue-glow:rgba(14,165,233,0.10);--blue-glow-md:rgba(14,165,233,0.18);
  --bg:#08080A;--bg-card:#101014;--bg-input:#0C0C10;
  --border:#1C1C26;--border-hover:rgba(14,165,233,0.35);--border-focus:rgba(14,165,233,0.5);
  --text:#F0F0F4;--text-muted:#6B6B80;--text-subtle:#35354A;
  --red:rgba(239,68,68,0.08);--red-border:rgba(239,68,68,0.22);--red-text:#FCA5A5;
  --green:rgba(34,197,94,0.08);--green-border:rgba(34,197,94,0.22);--green-text:#86EFAC;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:22px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;}
.page{max-width:860px;margin:0 auto;padding:0 32px 100px;}

/* Header */
header{display:flex;flex-direction:column;align-items:center;padding:56px 0 44px;}
.logo-img{width:80px;height:80px;border-radius:20px;object-fit:cover;margin-bottom:20px;box-shadow:0 0 0 1px rgba(14,165,233,0.12),0 12px 40px rgba(0,0,0,0.6);animation:logoFloat 5s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);box-shadow:0 0 0 1px rgba(14,165,233,0.22),0 18px 44px rgba(14,165,233,0.07),0 8px 32px rgba(0,0,0,0.7);}}
.wordmark{font-family:'Outfit',sans-serif;font-size:3rem;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:10px;}
.wordmark .hash{color:var(--text);}.wordmark .can{color:var(--blue-bright);}
.header-sub{font-size:0.875rem;color:var(--text-muted);}
.header-owner{margin-top:16px;display:inline-flex;align-items:center;gap:7px;font-size:0.68rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--text-subtle);border:1px solid var(--border);border-radius:100px;padding:5px 16px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}


















/* Card */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;margin-bottom:14px;}
.field-label{display:block;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.topic-input{
  width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:300;
  padding:16px 18px;resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  min-height:96px;line-height:1.65;
}
.topic-input::placeholder{color:var(--text-subtle);}
.topic-input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--blue-glow);}
.row-divider{height:1px;background:var(--border);margin:26px 0;}
.controls{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.pill-group{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
.pill{font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;padding:8px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.16s;white-space:nowrap;}
.pill:hover{border-color:rgba(14,165,233,0.25);color:var(--text);}
.pill.active{border-color:var(--blue);background:var(--blue-glow);color:var(--blue-bright);}
.count-control{display:flex;flex-direction:column;gap:7px;min-width:140px;}
.count-display{display:flex;align-items:center;justify-content:space-between;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;}
.count-val{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:600;color:var(--blue-bright);min-width:32px;text-align:center;}
.count-unit{font-size:0.72rem;color:var(--text-muted);}
.count-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.count-btn:hover{border-color:var(--blue);color:var(--blue-bright);background:var(--blue-glow);}
.count-btn:disabled{opacity:0.3;cursor:not-allowed;}
.count-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.count-fill{height:100%;background:linear-gradient(90deg,var(--blue-dim),var(--blue-bright));border-radius:2px;transition:width 0.3s cubic-bezier(0.4,0,0.2,1);}
.gen-btn{
  width:100%;margin-top:24px;padding:16px 24px;
  background:var(--blue);color:#fff;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.04em;
  border:none;border-radius:var(--radius-lg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.gen-btn:hover:not(:disabled){background:var(--blue-bright);box-shadow:0 0 0 1px rgba(56,189,248,0.2),0 10px 28px rgba(14,165,233,0.18);transform:translateY(-1px);}
.gen-btn:active:not(:disabled){transform:translateY(0);}
.gen-btn:disabled{opacity:0.4;cursor:not-allowed;}
.gen-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.12) 50%,transparent 65%);transform:translateX(-100%);animation:btnShimmer 3.5s 0.5s infinite;}
@keyframes btnShimmer{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}

/* Loader */
.loader{display:none;flex-direction:column;align-items:center;gap:16px;padding:40px 0;}
.loader.active{display:flex;}
.loader-ring{width:38px;height:38px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-label{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);animation:fadeOsc 1.5s ease-in-out infinite;}
@keyframes fadeOsc{0%,100%{opacity:0.25;}50%{opacity:1;}}

/* Results */
.results{display:none;}.results.active{display:block;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;text-align:center;}
.stat-n{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:700;color:var(--blue-bright);line-height:1;margin-bottom:5px;}
.stat-l{font-size:0.65rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);}
.results-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.results-title{font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);}
.copy-all{font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;display:flex;align-items:center;gap:7px;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:100px;padding:7px 16px;cursor:pointer;transition:all 0.18s;}
.copy-all:hover{color:var(--blue-bright);border-color:var(--border-hover);}
.tags-wrap{display:flex;flex-wrap:wrap;gap:9px;}
.tag{display:inline-flex;align-items:center;font-size:0.85rem;font-weight:400;padding:9px 16px;border-radius:100px;border:1px solid var(--border);background:var(--bg-card);color:var(--blue-bright);cursor:pointer;transition:all 0.16s cubic-bezier(0.34,1.56,0.64,1);animation:tagIn 0.32s cubic-bezier(0.34,1.56,0.64,1) both;user-select:none;}
@keyframes tagIn{from{opacity:0;transform:scale(0.88) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.tag:hover{border-color:var(--blue);background:var(--blue-glow-md);transform:translateY(-2px) scale(1.025);box-shadow:0 6px 18px var(--blue-glow);}
.tag.done{border-color:var(--blue);background:var(--blue-glow-md);}

/* Error banner */
.error-banner{display:none;align-items:center;gap:10px;background:var(--red);border:1px solid var(--red-border);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:14px;font-size:0.82rem;color:var(--red-text);}
.error-banner.active{display:flex;}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--bg-card);border:1px solid rgba(14,165,233,0.3);border-radius:100px;padding:11px 24px;font-size:0.78rem;font-weight:500;letter-spacing:0.04em;color:var(--blue-bright);box-shadow:0 10px 40px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{text-align:center;padding-top:48px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-subtle);}
footer span{color:rgba(14,165,233,0.45);}

@media(max-width:560px){
  .page{padding:0 18px 80px;}
  .wordmark{font-size:2.4rem;}
  .controls{flex-direction:column;}
  .count-control{min-width:unset;width:100%;}
  .card{padding:22px 18px;}
  
  .stat-n{font-size:1.6rem;}
  
}
</style>
</head>

    <div class="header-sub">Konuna göre hashtaglerini üret</div>

  <div class="error-banner" id="errorBanner">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v4M8 11v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    <span id="errorMsg">Bir hata oluştu.</span>
  </div>

  <div class="card">
    <label class="field-label">Konu</label>
    <textarea class="topic-input" id="topicInput" placeholder="Örn: teknoloji girişimi, seyahat fotoğrafçılığı, fitness motivasyonu..." rows="3"></textarea>

    <div class="row-divider"></div>

    <div class="controls">
      <div style="flex:1">
        <div class="field-label">Platform</div>
        <div class="pill-group" id="platformGroup">
          <button class="pill active" data-val="Instagram">Instagram</button>
          <button class="pill" data-val="Twitter/X">Twitter</button>
          <button class="pill" data-val="TikTok">TikTok</button>
          <button class="pill" data-val="LinkedIn">LinkedIn</button>
        </div>
      </div>
      <div class="count-control">
        <div class="field-label">Adet</div>
        <div class="count-display">
          <button class="count-btn" id="decBtn" onclick="changeCount(-5)">
            <svg width="11" height="2" viewBox="0 0 11 2" fill="none"><rect width="11" height="2" rx="1" fill="currentColor"/></svg>
          </button>
          <div><span class="count-val" id="countVal">20</span><span class="count-unit"> tag</span></div>
          <button class="count-btn" id="incBtn" onclick="changeCount(5)">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="4.5" width="2" height="11" rx="1" fill="currentColor"/><rect y="4.5" width="11" height="2" rx="1" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="count-track"><div class="count-fill" id="countFill"></div></div>
      </div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M7.5 1.5L9 5.5L13.5 7.5L9 9.5L7.5 13.5L6 9.5L1.5 7.5L6 5.5L7.5 1.5Z" fill="white" stroke="white" stroke-width="0.4" stroke-linejoin="round"/>
      </svg>
      Üret
    </button>
  </div>

  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-label">Analiz ediliyor...</div>
  </div>

  <div class="results" id="results">
    <div class="stats-row">
      <div class="stat"><div class="stat-n" id="sCount">0</div><div class="stat-l">Hashtag</div></div>
      <div class="stat"><div class="stat-n" id="sChars">0</div><div class="stat-l">Karakter</div></div>
      <div class="stat"><div class="stat-n" id="sScore">0</div><div class="stat-l">Skor</div></div>
    </div>
    <div class="results-hd">
      <div class="results-title">Hashtagler</div>
      <button class="copy-all" onclick="copyAll()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1"/><path d="M2 9V2.5A.5.5 0 0 1 2.5 2H9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
        Tümünü Kopyala
      </button>
    </div>
    <div class="tags-wrap" id="tagsWrap"></div>
  </div>

  <footer>by <span>Efe Aydın</span></footer>
</div>
<div class="toast" id="toast"></div>

<script>
var count = 20, MIN = 5, MAX = 50, platform = 'Instagram', allTags = [];

function updateCount() {
  document.getElementById('countVal').textContent = count;
  document.getElementById('countFill').style.width = ((count - MIN) / (MAX - MIN) * 100) + '%';
  document.getElementById('decBtn').disabled = count <= MIN;
  document.getElementById('incBtn').disabled = count >= MAX;
}
function changeCount(d) { count = Math.min(MAX, Math.max(MIN, count + d)); updateCount(); }

document.querySelectorAll('#platformGroup .pill').forEach(function(p) {
  p.addEventListener('click', function() {
    document.querySelectorAll('#platformGroup .pill').forEach(function(x){ x.classList.remove('active'); });
    p.classList.add('active'); platform = p.dataset.val;
  });
});




function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
function showError(msg) {
  var b = document.getElementById('errorBanner');
  document.getElementById('errorMsg').textContent = msg;
  b.classList.add('active');
  setTimeout(function(){ b.classList.remove('active'); }, 6000);
}
function copyAll() {
  if (!allTags.length) return;
  navigator.clipboard.writeText(allTags.join(' ')).then(function(){ showToast('Tümü kopyalandı'); });
}

async function generate() {
  var topic = document.getElementById('topicInput').value.trim();
  if (!topic) { showToast('Lütfen bir konu gir'); return; }

  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('loader').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('errorBanner').classList.remove('active');

  var prompt = 'Sen uzman bir sosyal medya stratejistisin. "' + topic + '" konusu icin ' + platform + ' platformuna ozel tam olarak ' + count + ' adet guclu ve viral hashtag uret.\n\nKurallar:\n- Tam olarak ' + count + ' hashtag uret\n- Her hashtag ayri satirda # ile baslasin\n- Turkce ve Ingilizce karisik olsun\n- Niche ve populer hashtaglerin karisimi olsun\n- Sadece hashtagleri yaz, hicbir aciklama veya numara ekleme';

  try {
    var res = await fetch('https://far-mouse-92.yasinefeaydin.deno.net', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1200,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      var err = await res.json().catch(function(){ return {}; });
      var msg = (err.error && err.error.message) || ('Hata: HTTP ' + res.status);
      if (res.status === 401) msg = 'Sunucu hatası: API key geçersiz.';
      if (res.status === 429) msg = 'Çok fazla istek. Biraz bekleyip tekrar dene.';
      throw new Error(msg);
    }

    var data = await res.json();
    var raw = data.content.map(function(b){ return b.text || ''; }).join('');
    var tags = Array.from(new Set(
      raw.split('\n')
        .map(function(l){ return l.trim().replace(/^\d+[\.\)\-]\s*/, ''); })
        .filter(function(l){ return l.startsWith('#') && l.length > 2; })
        .map(function(l){ return l.split(/\s/)[0]; })
    ));

    if (!tags.length) throw new Error('Hashtag üretilemedi, tekrar dene.');
    allTags = tags;

    document.getElementById('sCount').textContent = tags.length;
    document.getElementById('sChars').textContent = tags.join(' ').length;
    document.getElementById('sScore').textContent = Math.min(99, Math.round(tags.length * 2.8 + 18));

    var wrap = document.getElementById('tagsWrap');
    wrap.innerHTML = '';
    tags.forEach(function(tag, i) {
      var el = document.createElement('div');
      el.className = 'tag';
      el.style.animationDelay = (i * 0.032) + 's';
      el.textContent = tag;
      el.onclick = function() {
        navigator.clipboard.writeText(tag).then(function(){
          el.classList.add('done'); showToast('Kopyalandı');
          setTimeout(function(){ el.classList.remove('done'); }, 1500);
        });
      };
      wrap.appendChild(el);
    });
    document.getElementById('results').classList.add('active');

  } catch(e) {
    showError(e.message || 'Bir hata oluştu. Lütfen tekrar dene.');
  } finally {
    btn.disabled = false;
    document.getElementById('loader').classList.remove('active');
  }
}

document.getElementById('topicInput').addEventListener('keydown', function(e){
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
});

updateCount();
</script>
